services:
  backend:
    build: ./backend
    container_name: backend_prod
    ports:
      - "${DJANGO_PORT}:8000"
    env_file:
      - .env.prod
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: 7hours_db
    ports:
      - "${MYSQL_PORT_LOCAL}:3306"
    env_file:
      - .env.prod
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: